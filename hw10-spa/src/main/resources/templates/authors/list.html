<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Authors — Library</title>
</head>
<body>
<main>
    <div class="page-header">
        <h1>Authors</h1>
    </div>

    <table th:if="${not #lists.isEmpty(authors)}">
        <thead>
        <tr>
            <th>#</th>
            <th>Full Name</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="author : ${authors}">
            <td th:text="${author.id}"></td>
            <td th:text="${author.fullName}"></td>
        </tr>
        </tbody>
    </table>

    <p th:if="${#lists.isEmpty(authors)}" style="color: var(--muted); margin-top: 2rem;">
        No authors found.
    </p>
</main>
</body>
</html>
