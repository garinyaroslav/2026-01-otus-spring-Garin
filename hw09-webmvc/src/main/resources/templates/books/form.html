<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title th:text="${book.id == null ? 'New Book — Library' : 'Edit Book — Library'}">Book Form — Library</title>
</head>
<body>
<main>
    <div class="page-header">
        <h1 th:text="${book.id == null ? 'New Book' : 'Edit Book'}">Book Form</h1>
        <a th:href="@{/books}" class="btn btn-secondary">← All Books</a>
    </div>

    <div class="form-card">
        <form th:action="${book.id == null ? '/books/create' : '/books/' + book.id + '/edit'}"
              th:object="${book}"
              method="post">

            <div class="form-group">
                <label for="title">Title</label>
                <input id="title" type="text" class="form-control"
                       th:field="*{title}" placeholder="Enter book title" required/>
            </div>

            <div class="form-group">
                <label for="authorId">Author</label>

                <select id="authorId" class="form-control" th:field="*{authorId}" required>
                    <option value="">— Select author —</option>
                    <option th:each="author : ${authors}"
                            th:value="${author.id}"
                            th:text="${author.fullName}"></option>
                </select>
            </div>

            <div class="form-group">
                <label for="genreIds">Genres <span style="font-weight:300; text-transform:none;">(hold Ctrl / Cmd to select multiple)</span></label>
                <select id="genreIds" class="form-control" th:field="*{genreIds}" multiple required>
                    <option th:each="genre : ${genres}"
                            th:value="${genre.id}"
                            th:text="${genre.name}"></option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary"
                        th:text="${book.id == null ? 'Create Book' : 'Save Changes'}">Submit</button>
                <a th:href="@{/books}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</main>
</body>
</html>
