spring:
  datasource:
    url: jdbc:h2:mem:maindb
    show-sql: true
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
  shell:
    interactive:
      enabled: true
  sql:
    init:
      mode: always
      data-locations: data.sql
      schema-locations: schema.sql
  h2:
    console:
      enabled: true
