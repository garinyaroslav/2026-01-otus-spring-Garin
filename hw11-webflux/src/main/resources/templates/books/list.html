<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Books — Library</title>
</head>
<body>
<main>
    <div class="page-header">
        <h1>Books</h1>
        <a th:href="@{/books/create}" class="btn btn-primary">+ Add Book</a>
    </div>

    <table th:if="${not #lists.isEmpty(books)}">
        <thead>
        <tr>
            <th>#</th>
            <th>Title</th>
            <th>Author</th>
            <th>Genres</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="book : ${books}">
            <td th:text="${book.id}"></td>
            <td>
                <a th:href="@{/books/{id}(id=${book.id})}"
                   th:text="${book.title}"
                   style="color: inherit; text-decoration: none; font-weight: 600;"></a>
            </td>
            <td th:text="${book.author.fullName}"></td>
            <td>
                <span th:each="genre : ${book.genres}"
                      th:text="${genre.name}"
                      class="tag"></span>
            </td>
            <td>
                <div class="btn-group">
                    <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-secondary btn-sm">View</a>
                    <a th:href="@{/books/{id}/edit(id=${book.id})}" class="btn btn-secondary btn-sm">Edit</a>
                    <a th:href="@{/books/{id}/delete(id=${book.id})}" class="btn btn-danger btn-sm">Delete</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>

    <p th:if="${#lists.isEmpty(books)}" style="color: var(--muted); margin-top: 2rem;">
        No books yet. <a th:href="@{/books/create}">Add the first one.</a>
    </p>
</main>
</body>
</html>
