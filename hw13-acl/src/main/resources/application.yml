spring:
  datasource:
    url: jdbc:h2:mem:maindb
    show-sql: true
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
      data-locations: classpath:data.sql
      schema-locations: classpath:schema.sql
  h2:
    console:
      enabled: true
  thymeleaf:
    cache: false
